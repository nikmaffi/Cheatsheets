<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHEATSHEET INDEX — TERMINAL V1.0</title>
<style>
  /* Font in stile retro terminale */
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

  :root {
    --bg:        #050505; /* Nero profondo */
    --bg2:       #0a0a0a;
    --panel:     #0f0f0f;
    --border:    #1a1a1a;
    --border2:   #333333;
    --glow:      #00ff41; /* Verde Matrix/Terminal */
    --glow-dim:  #003b00;
    --text:      #b0b0b0; /* Grigio chiaro */
    --bright:    #00ff41; /* Verde acceso per evidenziare */
    --accent:    #008f11;
    --scan:      rgba(0, 255, 65, 0.03);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Effetto linee di scansione CRT */
  body::before {
    content:'';
    position:fixed; top:0; left:0; right:0; bottom:0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      var(--scan) 2px,
      var(--scan) 4px
    );
    pointer-events:none;
    z-index:9999;
  }

  /* Header */
  #header {
    background: var(--bg2);
    border-bottom: 2px solid var(--glow);
    padding: 20px 25px;
    position: sticky; top:0; z-index:100;
    box-shadow: 0 0 20px var(--glow-dim);
  }

  #header h1 {
    font-family: 'VT323', monospace;
    font-size: 2.5rem;
    color: var(--bright);
    text-shadow: 0 0 10px var(--glow);
    letter-spacing: 2px;
  }

  /* Layout a due colonne */
  #layout { display:flex; }

  /* Sidebar per le Categorie */
  #sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--panel);
    border-right: 1px solid var(--border2);
    height: calc(100vh - 85px);
    overflow-y: auto;
    position: sticky;
    top: 85px;
    padding: 15px 0;
  }

  .nav-head {
    font-family: 'VT323', monospace;
    font-size: 1.2rem;
    color: var(--bright);
    padding: 10px 15px;
    border-bottom: 1px solid var(--border2);
    margin-bottom: 10px;
  }

  .nav-section-title {
    color: var(--accent);
    font-size: 11px;
    padding: 10px 15px 5px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  #sidebar a {
    display: block;
    color: var(--text);
    text-decoration: none;
    padding: 5px 20px;
    transition: 0.2s;
    border-left: 3px solid transparent;
  }

  #sidebar a:hover {
    color: var(--bright);
    background: rgba(0, 255, 65, 0.05);
    border-left-color: var(--glow);
  }

  /* Contenuto Principale */
  #main {
    flex:1;
    padding: 30px;
    max-width: calc(100vw - 260px);
  }

  .section {
    margin-bottom: 40px;
    border: 1px solid var(--border2);
    background: var(--bg2);
  }

  .section-header {
    background: var(--glow-dim);
    padding: 8px 15px;
    font-family: 'VT323', monospace;
    font-size: 1.3rem;
    color: var(--bright);
    border-bottom: 1px solid var(--glow);
  }

  .section-body { padding: 15px; }

  /* Lista dei link ai file html */
  .file-list {
    list-style: none;
  }

  .file-list li {
    margin-bottom: 8px;
  }

  .file-list a {
    color: var(--bright);
    text-decoration: none;
    font-size: 1.1rem;
  }

  .file-list a::before {
    content: "[EXE] ";
    color: var(--accent);
  }

  .file-list a:hover {
    text-decoration: underline;
    background: var(--glow);
    color: var(--bg);
  }

  .desc {
    display: block;
    font-size: 0.9rem;
    color: #666;
    margin-left: 55px;
  }

  /* Animazione Cursore */
  @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  .cursor::after { content:'_'; animation:blink 1s infinite; color:var(--glow); }

  @media(max-width:800px) {
    #sidebar { display:none; }
    #main { max-width:100vw; }
  }
</style>
</head>
<body>

<div id="header">
  <h1>ROOT:\CHEATSHEETS\INDEX<span class="cursor"></span></h1>
</div>

<div id="layout">
  <nav id="sidebar">
    <div class="nav-head">DIRECTORY TREE</div>
    
    <div class="nav-section">
      <div class="nav-section-title">Programming</div>
      <a href="#cat-lang">Languages</a>
    </div>
  </nav>

  <main id="main">
    
    <div class="section" id="cat-lang">
      <div class="section-header">01. PROGRAMMING LANGUAGES</div>
      <div class="section-body">
        <ul class="file-list">
          <li>
            <a href="cobol.html">COBOL_REFERENCE.html</a>
            <span class="desc">Guida completa a GnuCOBOL 3.x, Divisioni e Verbi.</span>
          </li>
        </ul>
      </div>
    </div>

  </main>
</div>

</body>
</html>
